<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테니스 복식 매치 매니저</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    line-height: 1.5;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .title { font-size: 22px; font-weight: 600; }
  .subtitle { font-size: 13px; color: #666; margin-top: 2px; }

  .stage { display: none; }
  .stage.active { display: block; }

  /* ============ 1단계: 인원 등록 ============ */
  .setup-info {
    background: white;
    border: 1px solid #e5e5e0;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .setup-info h2 { font-size: 16px; margin-bottom: 8px; }
  .setup-info p { font-size: 13px; color: #666; }

  .config-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #f0f0eb;
    flex-wrap: wrap;
  }
  .config-label { font-size: 14px; font-weight: 500; }
  .config-input {
    width: 60px;
    padding: 6px 10px;
    font-size: 14px;
    border: 1px solid #d4d4cc;
    border-radius: 8px;
    text-align: center;
    font-family: inherit;
  }

  .player-list { margin-bottom: 16px; }
  .player-card {
    background: white;
    border: 1px solid #e5e5e0;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .player-card-num {
    font-size: 13px;
    color: #999;
    min-width: 24px;
    font-weight: 600;
  }
  .player-input {
    flex: 1;
    padding: 8px 12px;
    font-size: 15px;
    border: 1px solid #d4d4cc;
    border-radius: 8px;
    font-family: inherit;
    min-width: 0;
  }
  .player-input:focus { outline: none; border-color: #1a1a1a; }

  .gender-toggle {
    display: flex;
    border: 1px solid #d4d4cc;
    border-radius: 8px;
    overflow: hidden;
  }
  .gender-btn {
    padding: 8px 12px;
    font-size: 13px;
    border: none;
    background: white;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    color: #666;
    font-weight: 500;
  }
  .gender-btn.active.male { background: #E6F1FB; color: #0C447C; }
  .gender-btn.active.female { background: #FBEAF0; color: #4B1528; }

  .delete-btn {
    background: transparent;
    border: none;
    color: #c44;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .delete-btn:hover { background: #fee; }

  .add-player-btn {
    width: 100%;
    padding: 14px;
    background: white;
    border: 1px dashed #d4d4cc;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    color: #666;
    font-family: inherit;
    transition: all 0.15s;
  }
  .add-player-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }

  .summary-box {
    background: white;
    border: 1px solid #e5e5e0;
    border-radius: 12px;
    padding: 16px 20px;
    margin: 20px 0;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0;
    font-size: 14px;
  }
  .summary-row .label { color: #666; }
  .summary-row .value { font-weight: 600; }
  .summary-warning { color: #c44; font-size: 12px; margin-top: 8px; }
  .summary-ok { color: #085041; font-size: 12px; margin-top: 8px; }

  /* ============ 2단계: 추첨 애니메이션 ============ */
  .draw-stage-area {
    background: white;
    border: 1px solid #e5e5e0;
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 16px;
    min-height: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .draw-stage-num { font-size: 14px; color: #888; margin-bottom: 6px; }
  .draw-stage-type {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 600;
    margin-bottom: 20px;
    display: inline-block;
  }
  .draw-progress-text {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
  }

  .roulette-display {
    width: 100%;
    margin: 16px 0;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .roulette-team {
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 700;
    min-width: 240px;
    transition: all 0.1s;
  }
  .roulette-team-a { background: #EEEDFE; color: #26215C; }
  .roulette-team-b { background: #E6F1FB; color: #042C53; }
  .roulette-vs { font-size: 14px; color: #999; font-weight: 400; }
  .roulette-rest { font-size: 13px; color: #666; margin-top: 12px; }
  .spinning .roulette-team { filter: blur(1.5px); }

  /* ============ 3단계: 경기 진행 ============ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid #ddd;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #666;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: inherit;
    white-space: nowrap;
  }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 600; }
  .section { display: none; }
  .section.active { display: block; }

  .play-card {
    background: white;
    border: 1px solid #e5e5e0;
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 16px;
    text-align: center;
  }
  .play-card.current { border: 2px solid #1a1a1a; }
  .play-num { font-size: 14px; color: #888; margin-bottom: 6px; }
  .play-teams {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
  }

  .pill-m { display: inline-block; padding: 3px 10px; background: #E6F1FB; color: #0C447C; border-radius: 999px; font-size: 13px; margin: 0 2px; font-weight: 500; }
  .pill-w { display: inline-block; padding: 3px 10px; background: #FBEAF0; color: #4B1528; border-radius: 999px; font-size: 13px; margin: 0 2px; font-weight: 500; }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }
  .btn {
    padding: 10px 18px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #d4d4cc;
    background: white;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    color: #1a1a1a;
  }
  .btn:hover:not(:disabled) { background: #f5f5f0; }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: #1a1a1a;
    color: white;
    border-color: #1a1a1a;
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) { background: #333; }
  .btn-large {
    padding: 14px 24px;
    font-size: 16px;
  }
  .btn-danger { color: #993356; }
  .btn-block { width: 100%; }

  .schedule-row {
    display: grid;
    grid-template-columns: 50px 50px 1fr auto;
    align-items: center;
    gap: 12px;
  }
  .match-num { font-size: 13px; color: #888; }
  .match-type {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
    text-align: center;
  }
  .teams-text { font-size: 14px; }
  .team-line { padding: 2px 0; }
  .vs-line { font-size: 11px; color: #aaa; padding-left: 4px; }
  .rest-line { font-size: 12px; color: #999; margin-top: 6px; }

  .status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 600;
    min-width: 60px;
    text-align: center;
    white-space: nowrap;
  }
  .status-pending { background: #f0f0eb; color: #888; }
  .status-current { background: #FAEEDA; color: #633806; }
  .status-done { background: #E1F5EE; color: #085041; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .stat-card {
    background: white;
    border: 1px solid #e5e5e0;
    border-radius: 12px;
    padding: 16px;
  }
  .stat-name { font-size: 14px; color: #666; margin-bottom: 4px; font-weight: 500; }
  .stat-value { font-size: 24px; font-weight: 600; }
  .stat-detail { font-size: 12px; color: #999; margin-top: 4px; }

  /* ============ 모달 ============ */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 24px;
    max-width: 400px;
    width: 100%;
  }
  .modal h3 { font-size: 18px; margin-bottom: 16px; }
  .score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .score-row-label { font-size: 14px; flex: 1; }
  .score-input {
    width: 70px;
    padding: 10px;
    font-size: 18px;
    text-align: center;
    border: 1px solid #d4d4cc;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 600;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  @media (max-width: 480px) {
    .roulette-team { font-size: 18px; min-width: 200px; padding: 12px 16px; }
    .title { font-size: 18px; }
    .schedule-row { grid-template-columns: 40px 44px 1fr auto; gap: 8px; }
    .player-card { flex-wrap: wrap; }
    .player-input { min-width: 120px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="title">🎾 테니스 복식 매치 매니저</div>
      <div class="subtitle" id="header-subtitle">인원을 등록해주세요</div>
    </div>
    <button class="btn btn-danger" id="reset-btn" style="display:none">처음부터</button>
  </div>

  <!-- ===== 1단계: 인원 등록 ===== -->
  <div class="stage active" id="stage-setup">
    <div class="setup-info">
      <h2>참가 인원 등록</h2>
      <p>이름과 성별을 입력하세요. 인원은 자유롭게 추가/삭제할 수 있습니다.</p>
      <div class="config-row">
        <span class="config-label">1인당 출전 경기 수</span>
        <input type="number" class="config-input" id="games-per-player" value="5" min="1" max="20">
        <span style="font-size: 12px; color: #888;">경기</span>
      </div>
    </div>

    <div class="player-list" id="player-list"></div>

    <button class="add-player-btn" id="add-player-btn">+ 참가자 추가</button>

    <div class="summary-box" id="summary-box"></div>

    <button class="btn btn-primary btn-large btn-block" id="start-draw-btn">추첨 시작 →</button>
  </div>

  <!-- ===== 2단계: 추첨 애니메이션 ===== -->
  <div class="stage" id="stage-draw">
    <div class="draw-stage-area">
      <div class="draw-stage-num" id="draw-num">경기 1 / 9</div>
      <div class="draw-stage-type type-mixed" id="draw-type">혼복</div>
      <div class="draw-progress-text" id="draw-progress">추첨 준비 중...</div>
      <div class="roulette-display" id="roulette-display">
        <div class="roulette-team roulette-team-a">? + ?</div>
        <div class="roulette-vs">VS</div>
        <div class="roulette-team roulette-team-b">? + ?</div>
      </div>
      <div class="roulette-rest" id="roulette-rest">휴식: ? · ? · ?</div>
    </div>
    <div class="controls">
      <button class="btn btn-primary btn-large" id="next-draw-btn">다음 경기 추첨 →</button>
      <button class="btn" id="finish-draw-btn" style="display:none">대진표 확정 →</button>
    </div>
  </div>

  <!-- ===== 3단계: 경기 진행 ===== -->
  <div class="stage" id="stage-play">
    <div class="tabs">
      <button class="tab active" data-tab="current">현재 경기</button>
      <button class="tab" data-tab="schedule">전체 일정</button>
      <button class="tab" data-tab="stats">출전 통계</button>
    </div>

    <div class="section active" id="current-section"></div>
    <div class="section" id="schedule-section"></div>
    <div class="section" id="stats-section">
      <div class="stats-grid" id="stats-grid"></div>
    </div>
  </div>
</div>

<!-- 점수 입력 모달 -->
<div class="modal-bg" id="score-modal-bg">
  <div class="modal">
    <h3 id="modal-title">경기 점수 입력</h3>
    <div class="score-row">
      <span class="score-row-label" id="modal-team-a">A팀</span>
      <input type="number" class="score-input" id="score-a" value="0" min="0">
    </div>
    <div class="score-row">
      <span class="score-row-label" id="modal-team-b">B팀</span>
      <input type="number" class="score-input" id="score-b" value="0" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">취소</button>
      <button class="btn btn-primary" id="modal-save">저장</button>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'tennis-mgr-v3';

  // 상태
  let state = {
    stage: 'setup', // setup, draw, play
    players: [
      { id: 1, name: '기영', gender: 'M' },
      { id: 2, name: '연화', gender: 'M' },
      { id: 3, name: '동준', gender: 'M' },
      { id: 4, name: '노운', gender: 'M' },
      { id: 5, name: '마리아', gender: 'W' },
      { id: 6, name: '미라', gender: 'W' },
      { id: 7, name: '혜윤', gender: 'W' }
    ],
    gamesPerPlayer: 5,
    schedule: [],
    drawnUpTo: 0, // 추첨 완료된 경기 인덱스 (0 = 아직 시작 안 함)
    currentIdx: 0,
    scores: {},
    finished: {}
  };
  let nextPlayerId = 8;

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const loaded = JSON.parse(raw);
        Object.assign(state, loaded);
        // nextPlayerId 복원
        if (state.players.length > 0) {
          nextPlayerId = Math.max(...state.players.map(p => p.id)) + 1;
        }
      }
    } catch(e) {}
  }
  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function isWoman(name) {
    const p = state.players.find(p => p.name === name);
    return p && p.gender === 'W';
  }
  function pill(name) {
    const cls = isWoman(name) ? 'pill-w' : 'pill-m';
    return '<span class="'+cls+'">'+name+'</span>';
  }

  // ============== 스테이지 전환 ==============
  function showStage(name) {
    state.stage = name;
    document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
    document.getElementById('stage-'+name).classList.add('active');
    document.getElementById('reset-btn').style.display = name === 'setup' ? 'none' : 'inline-block';

    const sub = document.getElementById('header-subtitle');
    if (name === 'setup') sub.textContent = '인원을 등록해주세요';
    else if (name === 'draw') sub.textContent = '추첨 진행 중';
    else sub.textContent = '경기 진행 중';

    saveState();
  }

  // ============== 1단계: 인원 등록 ==============
  function renderPlayerList() {
    const container = document.getElementById('player-list');
    let html = '';
    state.players.forEach((p, idx) => {
      html += '<div class="player-card" data-id="'+p.id+'">';
      html += '<span class="player-card-num">'+(idx+1)+'</span>';
      html += '<input type="text" class="player-input" value="'+escapeHtml(p.name)+'" placeholder="이름 입력" data-field="name">';
      html += '<div class="gender-toggle">';
      html += '<button class="gender-btn male '+(p.gender==='M'?'active':'')+'" data-gender="M">남</button>';
      html += '<button class="gender-btn female '+(p.gender==='W'?'active':'')+'" data-gender="W">여</button>';
      html += '</div>';
      html += '<button class="delete-btn" data-action="delete">×</button>';
      html += '</div>';
    });
    container.innerHTML = html;

    // 이벤트 바인딩
    container.querySelectorAll('.player-card').forEach(card => {
      const id = parseInt(card.dataset.id);
      const player = state.players.find(p => p.id === id);

      card.querySelector('[data-field="name"]').addEventListener('input', (e) => {
        player.name = e.target.value;
        saveState();
        renderSummary();
      });
      card.querySelectorAll('.gender-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          player.gender = btn.dataset.gender;
          saveState();
          renderPlayerList();
          renderSummary();
        });
      });
      card.querySelector('[data-action="delete"]').addEventListener('click', () => {
        state.players = state.players.filter(p => p.id !== id);
        saveState();
        renderPlayerList();
        renderSummary();
      });
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function calculateScheduleStats() {
    const validPlayers = state.players.filter(p => p.name.trim() !== '');
    const total = validPlayers.length;
    const men = validPlayers.filter(p => p.gender === 'M').length;
    const women = validPlayers.filter(p => p.gender === 'W').length;
    const gamesPerPlayer = state.gamesPerPlayer;

    if (total < 4) return { total, men, women, valid: false, msg: '최소 4명 이상 필요합니다.' };
    if (gamesPerPlayer < 1) return { total, men, women, valid: false, msg: '경기 수는 1 이상이어야 합니다.' };

    const totalSlots = total * gamesPerPlayer;
    const totalMatches = Math.ceil(totalSlots / 4);

    // 여자 출전 슬롯 = women * gamesPerPlayer
    // 혼복 1경기당 여자 2명 → 혼복 경기 수 = ceil(women * gamesPerPlayer / 2)
    let mixedMatches = 0;
    let mensMatches = totalMatches;
    if (women >= 2) {
      mixedMatches = Math.min(totalMatches, Math.ceil((women * gamesPerPlayer) / 2));
      mensMatches = totalMatches - mixedMatches;
    } else if (women === 1) {
      // 여자 1명만 있으면 혼복 불가능 → 사실상 안 되는 케이스
      return { total, men, women, valid: false, msg: '여자 1명일 경우 혼복 페어가 안 만들어집니다. 0명 또는 2명 이상으로 설정해주세요.' };
    }

    // 남복 가능한지 검증: 남복 1경기당 남자 4명 출전
    if (mensMatches > 0 && men < 4) {
      // 남복이 필요한데 남자 4명 미만 → 혼복으로 흡수 시도
      if (women >= 2) {
        // 남복 경기를 혼복으로 돌리면 여자 출전 초과
        return { total, men, women, valid: false, msg: '남복 경기에 남자 4명이 필요한데 인원이 부족합니다. 남자를 추가하거나 경기 수를 줄여주세요.' };
      }
    }

    return { total, men, women, totalMatches, mixedMatches, mensMatches, valid: true };
  }

  function renderSummary() {
    const stats = calculateScheduleStats();
    const box = document.getElementById('summary-box');
    let html = '';
    html += '<div class="summary-row"><span class="label">총 인원</span><span class="value">'+stats.total+'명 (남 '+stats.men+' · 여 '+stats.women+')</span></div>';
    if (stats.valid) {
      html += '<div class="summary-row"><span class="label">총 경기 수</span><span class="value">'+stats.totalMatches+'경기</span></div>';
      html += '<div class="summary-row"><span class="label">혼복 / 남복</span><span class="value">'+stats.mixedMatches+' + '+stats.mensMatches+'경기</span></div>';
      html += '<div class="summary-row"><span class="label">1인당 출전</span><span class="value">평균 '+state.gamesPerPlayer+'경기</span></div>';
      html += '<div class="summary-ok">✓ 추첨 가능합니다</div>';
    } else {
      html += '<div class="summary-warning">⚠ '+stats.msg+'</div>';
    }
    box.innerHTML = html;

    document.getElementById('start-draw-btn').disabled = !stats.valid;
  }

  // ============== 균형 알고리즘: 대진표 생성 ==============
  function generateSchedule() {
    const stats = calculateScheduleStats();
    if (!stats.valid) return null;

    const validPlayers = state.players.filter(p => p.name.trim() !== '');
    const men = validPlayers.filter(p => p.gender === 'M').map(p => p.name);
    const women = validPlayers.filter(p => p.gender === 'W').map(p => p.name);

    const totalMatches = stats.totalMatches;
    const mixedMatches = stats.mixedMatches;
    const mensMatches = stats.mensMatches;

    // 매치 유형 배열 생성 후 섞기
    const matchTypes = [];
    for (let i = 0; i < mixedMatches; i++) matchTypes.push('혼복');
    for (let i = 0; i < mensMatches; i++) matchTypes.push('남복');

    // 남복은 가능한 한 분산 배치 - 균등 간격으로 끼워넣기
    const arrangedTypes = [];
    if (mensMatches === 0) {
      arrangedTypes.push(...matchTypes);
    } else {
      // 혼복 사이사이에 남복 끼워넣기
      const interval = Math.floor(totalMatches / mensMatches);
      let mensCount = 0;
      let mixedCount = 0;
      for (let i = 0; i < totalMatches; i++) {
        // 균등 분포 위치에 남복 배치
        if (mensCount < mensMatches && (i + 1) % interval === Math.floor(interval/2) + 1) {
          arrangedTypes.push('남복');
          mensCount++;
        } else if (mixedCount < mixedMatches) {
          arrangedTypes.push('혼복');
          mixedCount++;
        } else {
          arrangedTypes.push('남복');
          mensCount++;
        }
      }
    }

    // 각 선수의 목표 출전 횟수
    const target = {};
    validPlayers.forEach(p => target[p.name] = state.gamesPerPlayer);

    // 실제 출전 횟수 추적
    const played = {};
    validPlayers.forEach(p => played[p.name] = 0);

    // 최근 출전 기록 (연속 출전 방지용)
    const lastPlayed = {};
    validPlayers.forEach(p => lastPlayed[p.name] = -100);

    // 파트너십 카운트 (같은 파트너 반복 방지용)
    const partnerCount = {};
    // 매치업 카운트 (같은 상대 반복 방지용)
    const matchupCount = {};

    function pairKey(a, b) {
      return [a, b].sort().join('|');
    }

    const schedule = [];

    for (let mi = 0; mi < totalMatches; mi++) {
      const type = arrangedTypes[mi];
      const remainingMatches = totalMatches - mi;

      let candidatePool;
      if (type === '남복') {
        candidatePool = men;
      } else {
        candidatePool = [...men, ...women];
      }

      // 후보군에서 4명 선택 (남복: 남자 4, 혼복: 남자 2 + 여자 2)
      // 우선순위: 남은 출전 필요 횟수가 많은 순 → 가장 적게 출전한 순
      const scored = candidatePool.map(name => {
        const need = target[name] - played[name];
        const remaining = remainingMatches;
        // 필요 횟수 / 남은 경기 수가 높을수록 우선
        const urgency = need / remaining;
        return { name, need, urgency, played: played[name], gender: women.includes(name) ? 'W' : 'M' };
      });

      let selected;
      if (type === '남복') {
        // 남자 중 4명 선택
        scored.sort((a, b) => b.urgency - a.urgency || a.played - b.played || Math.random() - 0.5);
        selected = scored.slice(0, 4).map(s => s.name);
      } else {
        // 혼복: 남자 2 + 여자 2
        const menScored = scored.filter(s => s.gender === 'M').sort((a, b) => b.urgency - a.urgency || a.played - b.played || Math.random() - 0.5);
        const womenScored = scored.filter(s => s.gender === 'W').sort((a, b) => b.urgency - a.urgency || a.played - b.played || Math.random() - 0.5);
        selected = [...menScored.slice(0, 2).map(s => s.name), ...womenScored.slice(0, 2).map(s => s.name)];
      }

      // 4명을 2:2로 페어링 (파트너십 균형 고려)
      let bestA, bestB;
      let bestScore = Infinity;
      const pairings = [];
      if (type === '남복') {
        // 남자 4명: M0,M1 vs M2,M3 / M0,M2 vs M1,M3 / M0,M3 vs M1,M2
        pairings.push([[selected[0], selected[1]], [selected[2], selected[3]]]);
        pairings.push([[selected[0], selected[2]], [selected[1], selected[3]]]);
        pairings.push([[selected[0], selected[3]], [selected[1], selected[2]]]);
      } else {
        // 혼복: 남자2 여자2 → 남1+여1 vs 남2+여2 또는 남1+여2 vs 남2+여1
        const m1 = selected[0], m2 = selected[1], w1 = selected[2], w2 = selected[3];
        pairings.push([[m1, w1], [m2, w2]]);
        pairings.push([[m1, w2], [m2, w1]]);
      }

      pairings.forEach(([a, b]) => {
        const partnerScore = (partnerCount[pairKey(a[0], a[1])] || 0) + (partnerCount[pairKey(b[0], b[1])] || 0);
        const matchupScore = (matchupCount[pairKey(a[0], b[0])] || 0) + (matchupCount[pairKey(a[0], b[1])] || 0)
                           + (matchupCount[pairKey(a[1], b[0])] || 0) + (matchupCount[pairKey(a[1], b[1])] || 0);
        const score = partnerScore * 3 + matchupScore + Math.random() * 0.1;
        if (score < bestScore) {
          bestScore = score;
          bestA = a;
          bestB = b;
        }
      });

      // 기록 업데이트
      [...bestA, ...bestB].forEach(p => { played[p]++; lastPlayed[p] = mi; });
      partnerCount[pairKey(bestA[0], bestA[1])] = (partnerCount[pairKey(bestA[0], bestA[1])] || 0) + 1;
      partnerCount[pairKey(bestB[0], bestB[1])] = (partnerCount[pairKey(bestB[0], bestB[1])] || 0) + 1;
      [bestA[0], bestA[1]].forEach(pa => {
        [bestB[0], bestB[1]].forEach(pb => {
          matchupCount[pairKey(pa, pb)] = (matchupCount[pairKey(pa, pb)] || 0) + 1;
        });
      });

      const restAll = validPlayers.map(p => p.name).filter(n => !bestA.includes(n) && !bestB.includes(n));

      schedule.push({
        n: mi + 1,
        type,
        a: bestA,
        b: bestB,
        rest: restAll
      });
    }

    return schedule;
  }

  // ============== 2단계: 추첨 애니메이션 ==============
  function startDraw() {
    const schedule = generateSchedule();
    if (!schedule) return;
    state.schedule = schedule;
    state.drawnUpTo = 0;
    state.currentIdx = 0;
    state.scores = {};
    state.finished = {};
    showStage('draw');
    renderDrawStage();
  }

  function renderDrawStage() {
    if (state.drawnUpTo >= state.schedule.length) {
      // 모두 추첨 완료
      document.getElementById('draw-progress').textContent = '✓ 모든 경기 추첨이 완료되었습니다!';
      document.getElementById('next-draw-btn').style.display = 'none';
      document.getElementById('finish-draw-btn').style.display = 'inline-block';
      const lastM = state.schedule[state.schedule.length - 1];
      document.getElementById('draw-num').textContent = '경기 ' + lastM.n + ' / ' + state.schedule.length;
      const typeEl = document.getElementById('draw-type');
      typeEl.textContent = lastM.type;
      typeEl.className = 'draw-stage-type ' + (lastM.type === '혼복' ? 'type-mixed' : 'type-mens');
      document.getElementById('roulette-display').innerHTML =
        '<div class="roulette-team roulette-team-a">'+pill(lastM.a[0])+' + '+pill(lastM.a[1])+'</div>' +
        '<div class="roulette-vs">VS</div>' +
        '<div class="roulette-team roulette-team-b">'+pill(lastM.b[0])+' + '+pill(lastM.b[1])+'</div>';
      document.getElementById('roulette-rest').innerHTML = '휴식: ' + lastM.rest.map(pill).join(' ');
      return;
    }

    const m = state.schedule[state.drawnUpTo];
    document.getElementById('draw-num').textContent = '경기 ' + m.n + ' / ' + state.schedule.length;
    const typeEl = document.getElementById('draw-type');
    typeEl.textContent = m.type;
    typeEl.className = 'draw-stage-type ' + (m.type === '혼복' ? 'type-mixed' : 'type-mens');
    document.getElementById('draw-progress').textContent = '추첨 ' + (state.drawnUpTo) + ' / ' + state.schedule.length + ' 완료';
    document.getElementById('roulette-display').innerHTML =
      '<div class="roulette-team roulette-team-a">? + ?</div>' +
      '<div class="roulette-vs">VS</div>' +
      '<div class="roulette-team roulette-team-b">? + ?</div>';
    document.getElementById('roulette-rest').textContent = '휴식: ? · ? · ?';

    document.getElementById('next-draw-btn').style.display = 'inline-block';
    document.getElementById('next-draw-btn').textContent = state.drawnUpTo === 0 ? '추첨 시작 →' : '다음 경기 추첨 →';
    document.getElementById('finish-draw-btn').style.display = 'none';
  }

  function animateNextMatch() {
    const m = state.schedule[state.drawnUpTo];
    const display = document.getElementById('roulette-display');
    const restEl = document.getElementById('roulette-rest');
    const validPlayers = state.players.filter(p => p.name.trim() !== '').map(p => p.name);
    const men = state.players.filter(p => p.gender === 'M' && p.name.trim() !== '').map(p => p.name);

    let pool;
    if (m.type === '남복') {
      pool = [...men];
    } else {
      pool = [...validPlayers];
    }

    let ticks = 0;
    const maxTicks = 22;
    document.getElementById('next-draw-btn').disabled = true;
    display.parentElement.classList.add('spinning');

    const interval = setInterval(() => {
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      if (m.type === '남복') {
        const womenList = state.players.filter(p => p.gender === 'W' && p.name.trim() !== '').map(p => p.name);
        const restMen = shuffled.slice(4);
        display.innerHTML =
          '<div class="roulette-team roulette-team-a">'+pill(shuffled[0])+' + '+pill(shuffled[1])+'</div>' +
          '<div class="roulette-vs">VS</div>' +
          '<div class="roulette-team roulette-team-b">'+pill(shuffled[2])+' + '+pill(shuffled[3])+'</div>';
        restEl.innerHTML = '휴식: ' + [...womenList, ...restMen].map(pill).join(' ');
      } else {
        display.innerHTML =
          '<div class="roulette-team roulette-team-a">'+pill(shuffled[0])+' + '+pill(shuffled[1])+'</div>' +
          '<div class="roulette-vs">VS</div>' +
          '<div class="roulette-team roulette-team-b">'+pill(shuffled[2])+' + '+pill(shuffled[3])+'</div>';
        restEl.innerHTML = '휴식: ' + shuffled.slice(4).map(pill).join(' ');
      }
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(interval);
        display.parentElement.classList.remove('spinning');
        // 최종 결과 표시
        display.innerHTML =
          '<div class="roulette-team roulette-team-a">'+pill(m.a[0])+' + '+pill(m.a[1])+'</div>' +
          '<div class="roulette-vs">VS</div>' +
          '<div class="roulette-team roulette-team-b">'+pill(m.b[0])+' + '+pill(m.b[1])+'</div>';
        restEl.innerHTML = '휴식: ' + m.rest.map(pill).join(' ');
        state.drawnUpTo++;
        saveState();
        document.getElementById('next-draw-btn').disabled = false;
        document.getElementById('draw-progress').textContent = '추첨 ' + state.drawnUpTo + ' / ' + state.schedule.length + ' 완료';

        if (state.drawnUpTo >= state.schedule.length) {
          document.getElementById('next-draw-btn').style.display = 'none';
          document.getElementById('finish-draw-btn').style.display = 'inline-block';
        } else {
          document.getElementById('next-draw-btn').textContent = '다음 경기 추첨 →';
        }
      }
    }, 80);
  }

  // ============== 3단계: 경기 진행 ==============
  function renderCurrentMatch() {
    const container = document.getElementById('current-section');
    const m = state.schedule[state.currentIdx];
    if (!m) {
      container.innerHTML = '<div class="play-card"><h2>모든 경기가 완료되었습니다 🎉</h2></div>';
      return;
    }
    const isFinished = state.finished[m.n];
    const score = state.scores[m.n];

    let html = '<div class="play-card current">';
    html += '<div class="play-num">경기 ' + m.n + ' / ' + state.schedule.length + '</div>';
    html += '<div class="type-badge ' + (m.type === '혼복' ? 'type-mixed' : 'type-mens') + '">' + m.type + '</div>';
    html += '<div class="play-teams">';
    html += '<div class="roulette-team roulette-team-a">'+pill(m.a[0])+' + '+pill(m.a[1])+'</div>';
    html += '<div class="roulette-vs">VS</div>';
    html += '<div class="roulette-team roulette-team-b">'+pill(m.b[0])+' + '+pill(m.b[1])+'</div>';
    html += '</div>';
    html += '<div class="rest-line">휴식: ' + m.rest.join(' · ') + '</div>';
    if (isFinished) {
      html += '<div style="margin-top:16px; font-size:18px; font-weight:600; color:#085041;">최종 ' + score.a + ' : ' + score.b + '</div>';
    }
    html += '<div class="controls">';
    html += '<button class="btn" id="prev-match-btn"' + (state.currentIdx === 0 ? ' disabled' : '') + '>◀ 이전</button>';
    html += '<button class="btn btn-primary" id="finish-match-btn">' + (isFinished ? '점수 수정' : '경기 종료 / 점수 입력') + '</button>';
    html += '<button class="btn" id="next-match-btn"' + (state.currentIdx >= state.schedule.length - 1 ? ' disabled' : '') + '>다음 ▶</button>';
    html += '</div>';
    html += '</div>';

    container.innerHTML = html;

    document.getElementById('prev-match-btn').addEventListener('click', () => {
      if (state.currentIdx > 0) { state.currentIdx--; saveState(); renderCurrentMatch(); }
    });
    document.getElementById('next-match-btn').addEventListener('click', () => {
      if (state.currentIdx < state.schedule.length - 1) { state.currentIdx++; saveState(); renderCurrentMatch(); }
    });
    document.getElementById('finish-match-btn').addEventListener('click', openScoreModal);
  }

  function renderSchedule() {
    const container = document.getElementById('schedule-section');
    let html = '';
    state.schedule.forEach((m, idx) => {
      const isDone = state.finished[m.n];
      const isCurrent = idx === state.currentIdx && !isDone;
      const statusCls = isDone ? 'status-done' : (isCurrent ? 'status-current' : 'status-pending');
      const statusTxt = isDone ? '완료' : (isCurrent ? '진행' : '대기');
      const score = state.scores[m.n];
      const scoreTxt = score ? ' '+score.a+':'+score.b : '';
      const typeCls = m.type === '혼복' ? 'type-mixed' : 'type-mens';
      html += '<div class="card" style="cursor:pointer" data-idx="'+idx+'">';
      html += '<div class="schedule-row">';
      html += '<div class="match-num">경기'+m.n+'</div>';
      html += '<span class="match-type '+typeCls+'">'+m.type+'</span>';
      html += '<div class="teams-text">';
      html += '<div class="team-line">'+pill(m.a[0])+' + '+pill(m.a[1])+'</div>';
      html += '<div class="vs-line">vs</div>';
      html += '<div class="team-line">'+pill(m.b[0])+' + '+pill(m.b[1])+'</div>';
      html += '</div>';
      html += '<span class="status '+statusCls+'">'+statusTxt+scoreTxt+'</span>';
      html += '</div>';
      html += '<div class="rest-line">휴식: '+m.rest.join(' · ')+'</div>';
      html += '</div>';
    });
    container.innerHTML = html;
    container.querySelectorAll('[data-idx]').forEach(el => {
      el.addEventListener('click', () => {
        state.currentIdx = parseInt(el.dataset.idx);
        saveState();
        switchPlayTab('current');
        renderCurrentMatch();
      });
    });
  }

  function renderStats() {
    const validPlayers = state.players.filter(p => p.name.trim() !== '');
    const stats = {};
    validPlayers.forEach(p => stats[p.name] = {played: 0, total: 0, wins: 0, gender: p.gender});

    state.schedule.forEach(m => {
      [...m.a, ...m.b].forEach(p => { if (stats[p]) stats[p].total++; });
      if (state.finished[m.n]) {
        [...m.a, ...m.b].forEach(p => { if (stats[p]) stats[p].played++; });
        const s = state.scores[m.n];
        if (s) {
          const winners = s.a > s.b ? m.a : (s.b > s.a ? m.b : []);
          winners.forEach(p => { if (stats[p]) stats[p].wins++; });
        }
      }
    });

    const grid = document.getElementById('stats-grid');
    let html = '';
    Object.keys(stats).forEach(name => {
      const s = stats[name];
      html += '<div class="stat-card">';
      html += '<div class="stat-name">'+name+(s.gender === 'W' ? ' ♀' : ' ♂')+'</div>';
      html += '<div class="stat-value">'+s.played+' / '+s.total+'</div>';
      html += '<div class="stat-detail">승 '+s.wins+'경기</div>';
      html += '</div>';
    });
    grid.innerHTML = html;
  }

  function switchPlayTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('#stage-play .section').forEach(s => s.classList.remove('active'));
    document.getElementById(name+'-section').classList.add('active');
    if (name === 'current') renderCurrentMatch();
    if (name === 'schedule') renderSchedule();
    if (name === 'stats') renderStats();
  }

  // ============== 모달 ==============
  function openScoreModal() {
    const m = state.schedule[state.currentIdx];
    document.getElementById('modal-title').textContent = '경기 ' + m.n + ' 점수 입력';
    document.getElementById('modal-team-a').innerHTML = 'A팀: ' + m.a.map(pill).join(' + ');
    document.getElementById('modal-team-b').innerHTML = 'B팀: ' + m.b.map(pill).join(' + ');
    const s = state.scores[m.n] || {a:0, b:0};
    document.getElementById('score-a').value = s.a || 0;
    document.getElementById('score-b').value = s.b || 0;
    document.getElementById('score-modal-bg').classList.add('active');
  }
  function closeScoreModal() {
    document.getElementById('score-modal-bg').classList.remove('active');
  }
  function saveScore() {
    const m = state.schedule[state.currentIdx];
    const a = parseInt(document.getElementById('score-a').value) || 0;
    const b = parseInt(document.getElementById('score-b').value) || 0;
    state.scores[m.n] = { a, b };
    state.finished[m.n] = true;
    saveState();
    closeScoreModal();
    if (state.currentIdx < state.schedule.length - 1) state.currentIdx++;
    renderCurrentMatch();
    renderSchedule();
    renderStats();
  }

  // ============== 이벤트 바인딩 ==============
  document.getElementById('add-player-btn').addEventListener('click', () => {
    const menCount = state.players.filter(p => p.gender === 'M').length;
    const womenCount = state.players.filter(p => p.gender === 'W').length;
    state.players.push({ id: nextPlayerId++, name: '', gender: menCount <= womenCount ? 'M' : 'W' });
    saveState();
    renderPlayerList();
    renderSummary();
  });

  document.getElementById('games-per-player').addEventListener('input', (e) => {
    state.gamesPerPlayer = parseInt(e.target.value) || 5;
    saveState();
    renderSummary();
  });

  document.getElementById('start-draw-btn').addEventListener('click', startDraw);

  document.getElementById('next-draw-btn').addEventListener('click', animateNextMatch);
  document.getElementById('finish-draw-btn').addEventListener('click', () => {
    showStage('play');
    renderCurrentMatch();
    renderSchedule();
    renderStats();
  });

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => switchPlayTab(t.dataset.tab));
  });

  document.getElementById('modal-cancel').addEventListener('click', closeScoreModal);
  document.getElementById('modal-save').addEventListener('click', saveScore);
  document.getElementById('score-modal-bg').addEventListener('click', (e) => {
    if (e.target.id === 'score-modal-bg') closeScoreModal();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('처음부터 다시 시작하시겠어요? 모든 진행 상황이 초기화됩니다.')) {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  });

  // ============== 초기화 ==============
  loadState();
  renderPlayerList();
  renderSummary();
  document.getElementById('games-per-player').value = state.gamesPerPlayer;

  if (state.stage === 'play') {
    showStage('play');
    renderCurrentMatch();
    renderSchedule();
    renderStats();
  } else if (state.stage === 'draw') {
    showStage('draw');
    renderDrawStage();
  } else {
    showStage('setup');
  }
})();
</script>
